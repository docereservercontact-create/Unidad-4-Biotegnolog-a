<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador UNAM - Biotecnología</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#eef3f8;
}

.header{
    background:#003366;
    color:white;
    padding:15px;
    text-align:center;
}

.main{
    display:flex;
}

.sidebar{
    width:220px;
    background:#1c2b3a;
    color:white;
    height:100vh;
    overflow-y:auto;
    padding:10px;
}

.sidebar button{
    width:45px;
    height:45px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.answered{ background:#28a745; color:white;}
.unanswered{ background:#ccc; }

.content{
    flex:1;
    padding:20px;
}

.timer{
    font-size:18px;
    font-weight:bold;
    color:red;
    text-align:right;
}

.question{
    font-size:20px;
}

.options label{
    display:block;
    margin:10px 0;
    cursor:pointer;
}

button{
    padding:10px 15px;
    margin:10px 5px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h2>Simulador UNAM - Biotecnología</h2>
</div>

<div id="inicio" style="padding:40px; text-align:center;">
<input id="nombre" placeholder="Nombre completo"><br><br>
<input id="cuenta" placeholder="Número de cuenta"><br><br>
<button onclick="iniciar()">Iniciar examen</button>
</div>

<div id="app" style="display:none;" class="main">

<div class="sidebar" id="panel"></div>

<div class="content">
<div class="timer" id="timer"></div>

<div id="pregunta"></div>
<div id="opciones" class="options"></div>

<button onclick="anterior()">Anterior</button>
<button onclick="siguiente()">Siguiente</button>
<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<div id="resultado" style="display:none; padding:30px;"></div>

<script>
const preguntas = [
{q:"La biotecnología se define como:",o:["Uso de máquinas","Uso de organismos vivos","Uso de minerales","Uso de energía"],r:1},
{q:"Un organismo transgénico es:",o:["Natural","Mutado","Modificado genéticamente","Clonado"],r:2},
{q:"La ingeniería genética permite:",o:["Modificar genes","Eliminar células","Crear proteínas","Dividir células"],r:0},
{q:"La insulina producida por bacterias es ejemplo de:",o:["Mutación","Clonación","Biotecnología","Reproducción"],r:2},
{q:"Un cultivo resistente a plagas es:",o:["Natural","Clonado","Transgénico","Mutado"],r:2},
{q:"La clonación produce organismos:",o:["Diferentes","Idénticos","Mutados","Recombinantes"],r:1},
{q:"La oveja Dolly fue:",o:["Mutación","Clonación","Transgénico","Natural"],r:1},
{q:"La clonación terapéutica busca:",o:["Crear individuos","Generar tejidos","Eliminar genes","Duplicar ADN"],r:1},
{q:"La clonación reproductiva genera:",o:["Órganos","Tejidos","Individuos completos","Células"],r:2},
{q:"Una ventaja de transgénicos es:",o:["Mayor producción","Menor calidad","Más plagas","Menor resistencia"],r:0},
{q:"Una desventaja es:",o:["Impacto ambiental","Mayor producción","Mejor nutrición","Resistencia"],r:0},
{q:"Los transgénicos contienen genes de:",o:["Otra especie","La misma especie","Ninguna","Solo bacterias"],r:0},
{q:"La bioética estudia:",o:["ADN","Aspectos morales","Proteínas","Células"],r:1},
{q:"La clonación humana está:",o:["Permitida","Regulada","Prohibida en muchos países","Libre"],r:2},
{q:"Un riesgo es:",o:["Pérdida de biodiversidad","Mayor biodiversidad","Mejor producción","Mayor calidad"],r:0},
{q:"La ingeniería genética trabaja con:",o:["Genes","Lípidos","Carbohidratos","Proteínas"],r:0},
{q:"Ejemplo de biotecnología:",o:["Fermentación","Respiración","Digestión","Fotosíntesis"],r:0},
{q:"Antibióticos se producen mediante:",o:["Biotecnología","Mutación","Clonación","Reproducción"],r:0},
{q:"ADN recombinante es:",o:["Natural","Modificado","Clonado","Destruido"],r:1},
{q:"Transgénicos mejoran:",o:["Nutrición","Color","Tamaño","Todas"],r:3},
{q:"Clonación usa:",o:["ADN idéntico","ADN distinto","ARN","Proteínas"],r:0},
{q:"Problema ético:",o:["Manipulación genética","Producción","División","Crecimiento"],r:0},
{q:"Objetivo biotecnología:",o:["Beneficio humano","Destruir organismos","Eliminar ADN","Reducir genes"],r:0},
{q:"Genes insertados:",o:["Alelos","Transgenes","Proteínas","Mutaciones"],r:1},
{q:"Regulación legal busca:",o:["Controlar riesgos","Eliminar ciencia","Reducir genes","Aumentar mutaciones"],r:0},
{q:"Clonación requiere:",o:["ADN idéntico","Proteínas","ARN","Células distintas"],r:0},
{q:"Transferencia genética ocurre en:",o:["Biotecnología","Digestión","Respiración","Fotosíntesis"],r:0},
{q:"Uso médico:",o:["Vacunas","Plantas","Animales","Cultivos"],r:0},
{q:"OGM significa:",o:["Organismos genéticamente modificados","Organismos naturales","Clones","Mutaciones"],r:0},
{q:"Biotecnología moderna usa:",o:["Tecnología genética","Solo química","Solo física","Solo biología"],r:0}
];

let actual=0;
let respuestas=new Array(preguntas.length);
let tiempoTotal = preguntas.length*65;
let tiempoPregunta = 0;

function iniciar(){
document.getElementById("inicio").style.display="none";
document.getElementById("app").style.display="flex";

crearPanel();
mostrar();

setInterval(()=>{
tiempoTotal--;
tiempoPregunta++;
document.getElementById("timer").innerText=
"Tiempo: "+formato(tiempoTotal)+" | Pregunta: "+tiempoPregunta+"s";
if(tiempoTotal<=0) finalizar();
},1000);
}

function formato(s){
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function crearPanel(){
let panel=document.getElementById("panel");
preguntas.forEach((_,i)=>{
let btn=document.createElement("button");
btn.innerText=i+1;
btn.className="unanswered";
btn.onclick=()=>{actual=i; mostrar();};
panel.appendChild(btn);
});
}

function mostrar(){
let p=preguntas[actual];
document.getElementById("pregunta").innerHTML=`<div class="question">${actual+1}. ${p.q}</div>`;

document.getElementById("opciones").innerHTML=p.o.map((op,i)=>
`<label><input type="radio" name="op" ${respuestas[actual]==i?'checked':''}
onclick="responder(${i})"> ${op}</label>`
).join("");

tiempoPregunta=0;
}

function responder(i){
respuestas[actual]=i;
document.querySelectorAll(".sidebar button")[actual].className="answered";
}

function siguiente(){
if(actual<preguntas.length-1){actual++; mostrar();}
}

function anterior(){
if(actual>0){actual--; mostrar();}
}

function finalizar(){
let aciertos=0;
preguntas.forEach((p,i)=>{if(respuestas[i]==p.r) aciertos++;});

document.getElementById("app").style.display="none";
document.getElementById("resultado").style.display="block";

document.getElementById("resultado").innerHTML=`
<h2>Resultados</h2>
<p><b>Nombre:</b> ${nombre.value}</p>
<p><b>Cuenta:</b> ${cuenta.value}</p>
<p><b>Aciertos:</b> ${aciertos}/30</p>
<p><b>Calificación:</b> ${(aciertos/30*10).toFixed(2)}</p>
<p><b>Tiempo total:</b> ${formato((preguntas.length*65)-tiempoTotal)}</p>
<button onclick="window.print()">Descargar PDF</button>
`;
}
</script>

</body>
</html>
